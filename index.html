<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOLLY CARS | Premium Rental</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav><div class="logo">NOLLY <span>CARS</span></div></nav>

    <header class="hero">
        <h1>NOLLY CARS</h1>
        <p class="hero-sub">АРЕНДА ПРЕМИАЛЬНЫХ АВТО В МОСКВА-СИТИ</p>
        <div class="trust-container">
            <div class="trust-item"><span>⚡</span> ПОДАЧА 30 МИН</div>
            <div class="trust-item"><span>🛡️</span> КАСКО ВКЛЮЧЕНО</div>
        </div>
    </header>

    <section class="quiz-section">
        <div class="quiz-card">
            <h2>ПОДОБРАТЬ ИДЕАЛЬНЫЙ АВТО?</h2>
            <button class="btn-neon" onclick="openQuiz()" style="margin-top:20px;">НАЧАТЬ ТЕСТ</button>
        </div>
    </section>

    <main id="cars-grid" class="grid"></main>

    <footer>
        <div class="footer-wrap">
            <div class="f-box"><h3>ГДЕ МЫ?</h3><p>Пресненская наб., 12</p></div>
            <div class="f-box"><h3>СВЯЗЬ</h3><p>+7 (495) 000-01-01</p></div>
        </div>
    </footer>

    <!-- Модалки -->
    <div id="quiz-modal">
        <div class="quiz-card" style="width: 90%; max-width: 400px;">
            <p id="quiz-question" style="font-size: 1.5rem; margin-bottom: 20px;"></p>
            <div id="quiz-options" style="display:flex; flex-direction:column;"></div>
        </div>
    </div>

    <div class="ai-messenger" onclick="toggleAiChat()">AI</div>
    <div id="ai-window" class="ai-chat-window">
        <div class="ai-chat-header">NOLLY AI <span onclick="toggleAiChat()" style="cursor:pointer">✕</span></div>
        <div class="ai-chat-body">
            <p style="margin-bottom:15px;">Выберите вопрос:</p>
            <button onclick="aiAnswer('КАСКО', 'Все авто застрахованы.')" style="width:100%; margin-bottom:5px; background:#222; border:1px solid #444; color:#fff; padding:10px; cursor:pointer;">Про КАСКО</button>
            <button onclick="aiAnswer('Оплата', 'Нал, карты, счет.')" style="width:100%; background:#222; border:1px solid #444; color:#fff; padding:10px; cursor:pointer;">Оплата</button>
            <div id="ai-response" style="margin-top:15px; color:var(--neon); display:none;"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
