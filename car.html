<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- КРИТИЧЕСКИ ВАЖНО ДЛЯ ТЕЛЕФОНОВ -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Детали автомобиля | NOLLY CARS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="car-details-page">
    <nav style="background: none; position: static; padding: 20px 5%;">
        <button class="btn-neon" onclick="window.location.href='index.html'">← КАТАЛОГ</button>
    </nav>

    <div class="container">
        <h1 id="det-name"></h1>
        
        <!-- Галерея 3 фото -->
        <div class="gallery">
            <img id="img1" src="" alt="Photo 1">
            <div class="side-photos">
                <img id="img2" src="" alt="Photo 2">
                <img id="img3" src="" alt="Photo 3">
            </div>
        </div>

        <div class="info-block">
            <h2 style="color: var(--neon-blue)">ХАРАКТЕРИСТИКИ</h2>
            <p id="det-desc"></p>
            <div class="specs-row">
                <div id="det-hp"></div>
                <div id="det-speed"></div>
            </div>
            <button class="btn-neon order-btn">ЗАБРОНИРОВАТЬ</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const selectedId = localStorage.getItem('currentCarId');
        const car = carData.find(c => c.id === selectedId);

        if (car) {
            document.getElementById('det-name').innerText = car.name;
            document.getElementById('det-desc').innerText = car.desc;
            document.getElementById('det-hp').innerText = "МОЩНОСТЬ: " + car.hp;
            document.getElementById('det-speed').innerText = car.speed ? "СКОРОСТЬ: " + car.speed : "";
            
            // Проверка на наличие картинок
            document.getElementById('img1').src = 'images/' + (car.imgs[0] || car.imgs);
            document.getElementById('img2').src = 'images/' + (car.imgs[1] || car.imgs);
            document.getElementById('img3').src = 'images/' + (car.imgs[2] || car.imgs);
        }
    </script>
</body>
</html>
