<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Детали | NOLLY CARS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 40px 8%;">
    <a href="index.html" class="btn-neon" style="text-decoration:none;">< НАЗАД</a>

    <div id="details" style="margin-top: 50px;">
        <h1 id="det-name" style="font-size: 5rem; line-height: 0.9;"></h1>
        
        <div class="gallery" style="display: grid; grid-template-columns: 2fr 1fr; gap: 20px; height: 500px; margin: 40px 0;">
            <img id="img1" style="width:100%; height:100%; object-fit:cover; border-radius:20px; border:2px solid #222;">
            <div style="display: grid; grid-template-rows: 1fr 1fr; gap: 20px;">
                <img id="img2" style="width:100%; height:100%; object-fit:cover; border-radius:20px; border:2px solid #222;">
                <img id="img3" style="width:100%; height:100%; object-fit:cover; border-radius:20px; border:2px solid #222;">
            </div>
        </div>

        <div style="background: var(--card); padding: 50px; border-radius: 30px; border: 1px solid #222;">
            <h2 style="color: var(--neon); margin-bottom: 20px;">ХАРАКТЕРИСТИКИ</h2>
            <p id="det-desc" style="font-size: 1.2rem; margin-bottom: 30px;"></p>
            <div style="display: flex; gap: 40px; font-size: 1.5rem; font-weight: 900;">
                <div>МОЩНОСТЬ: <span id="det-hp"></span></div>
                <div>МАКС. СКОРОСТЬ: <span id="det-speed"></span></div>
            </div>
            <button class="btn-neon" style="width: 100%; margin-top: 40px; padding: 25px;">ЗАБРОНИРОВАТЬ</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        const carId = localStorage.getItem('currentCarId');
        const car = carData.find(c => c.id === carId);
        if (car) {
            document.getElementById('det-name').innerText = car.name;
            document.getElementById('det-desc').innerText = car.desc;
            document.getElementById('det-hp').innerText = car.hp;
            document.getElementById('det-speed').innerText = car.speed;
            // Подгружаем 3 фото
            document.getElementById('img1').src = 'images/' + car.imgs[0];
            document.getElementById('img2').src = 'images/' + car.imgs[1];
            document.getElementById('img3').src = 'images/' + car.imgs[2];
        }
    </script>
</body>
</html>
